default_stages = ["pre-commit"]
default_install_hook_types = [
  "pre-commit",
  "pre-push",
]
fail_fast = true

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
  { id = "trailing-whitespace", priority = 0 },
  { id = "end-of-file-fixer", priority = 0 },
  { id = "check-toml", priority = 0 },
  { id = "check-yaml", args = ["--allow-multiple-documents"], priority = 0 },
  { id = "check-json", priority = 0 },
  { id = "check-case-conflict", priority = 0 },
  { id = "mixed-line-ending", args = ["--fix=lf"], priority = 0 },
  { id = "check-executables-have-shebangs", priority = 0 },
  { id = "check-shebang-scripts-are-executable", priority = 0 },
  { id = "check-added-large-files", args = ["--maxkb=100"], priority = 0 },
  { id = "check-merge-conflict", stages = ["pre-commit", "pre-push"], priority = 0 },
  { id = "no-commit-to-branch", name = "Block commits to main/master", stages = ["pre-commit", "pre-push"], priority = 0 },
]

[[repos]]
repo = "local"
hooks = [
  { id = "py-lint", name = "Python lint (make py-lint)", entry = "make py-lint", language = "system", files = '\.py$', pass_filenames = false, stages = ["pre-commit", "pre-push"], priority = 0 },
  { id = "docs-check", name = "Docs build (make docs-check)", entry = "make docs-check", language = "system", files = '\.(md|yml|yaml)$', pass_filenames = false, stages = ["pre-push"], priority = 0 },
  { id = "py-typecheck", name = "Python type checking (make py-typecheck)", entry = "make py-typecheck", language = "system", files = '\.py$', pass_filenames = false, stages = ["pre-push"], priority = 0 },
  { id = "py-test-quick", name = "Quick Python tests (make py-test-quick)", entry = "make py-test-quick", language = "system", pass_filenames = false, always_run = true, stages = ["pre-commit"], priority = 10 },
  { id = "py-test", name = "Full Python tests (make py-test)", entry = "make py-test", language = "system", pass_filenames = false, always_run = true, stages = ["pre-push"], priority = 10 },
  { id = "py-test-slack", name = "Slack integration tests (make py-test-slack)", entry = "make py-test-slack", language = "system", pass_filenames = false, always_run = true, stages = ["pre-push"], priority = 10 },
  { id = "py-test-llm", name = "LLM classifier tests (make py-test-llm)", entry = "make py-test-llm", language = "system", pass_filenames = false, always_run = true, stages = ["pre-push"], priority = 10 },
]

[[repos]]
repo = "https://github.com/rhysd/actionlint"
rev = "v1.7.11"
hooks = [
  { id = "actionlint", name = "Lint GitHub Actions workflows", priority = 0 },
]

[[repos]]
repo = "https://github.com/trufflesecurity/trufflehog"
rev = "v3.93.4"
hooks = [
  { id = "trufflehog", entry = "trufflehog filesystem --no-verification --no-update --force-skip-archives --force-skip-binaries --fail", exclude = 'uv\.lock$', pass_filenames = true, priority = 0 },
]
