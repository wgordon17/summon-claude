# Slack App Manifest for summon-claude
#
# Use this manifest to create the Slack app:
# 1. Go to https://api.slack.com/apps
# 2. Click "Create New App" → "From an app manifest"
# 3. Select your workspace
# 4. Paste the entire contents of this file
# 5. Click "Create"
#
# Then install the app and run `summon init` to configure tokens
#

display_information:
  name: summon-claude
  description: Bridge Claude Code sessions to Slack
  background_color: "#000000"

features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: false
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: summon-claude
    always_online: false
  slash_commands:
    - command: /summon
      description: Start a new Claude Code session
      usage_hint: "[auth-code]"
      should_escape: false

oauth_config:
  scopes:
    bot:
      - canvases:read
      - canvases:write
      - channels:history
      - channels:join
      - channels:manage
      - channels:read
      - chat:write
      - commands
      - files:read
      - files:write
      - groups:history
      - groups:read
      - groups:write
      - reactions:read
      - reactions:write
      - users:read

settings:
  org_deploy_enabled: false
  socket_mode_enabled: true
  event_subscriptions:
    bot_events:
      - app_home_opened
      - file_shared
      - message.channels
      - message.groups
      - reaction_added
  interactivity:
    is_enabled: true
